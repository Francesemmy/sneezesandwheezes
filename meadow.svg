      <use href="#blade-s" transform="translate(82 320) scale(1 1.1)"/>
      <use href="#blade-r" transform="translate(128 320) scale(1.1 0.85)"/>
      <use href="#blade-s" transform="translate(176 320) scale(0.8 1.25)"/>
      <use href="#blade-l" transform="translate(222 320) scale(1 0.9)"/>
      <use href="#blade-s" transform="translate(268 320) scale(1.1 1.35)"/>
      <use href="#blade-r" transform="translate(318 320) scale(0.9 0.7)"/>
      <use href="#blade-s" transform="translate(366 320) scale(1 1.05)"/>
      <use href="#blade-l" transform="translate(412 320) scale(1.1 1.25)"/>
      <use href="#blade-s" transform="translate(454 320) scale(0.85 0.8)"/>
