<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" preserveAspectRatio="xMidYEnd slice">
  <style>
    @keyframes sway-far  { 0%,100% { transform: rotate(-0.6deg); } 50% { transform: rotate(0.6deg); } }
    @keyframes sway-mid  { 0%,100% { transform: rotate(-1.1deg); } 50% { transform: rotate(1.1deg); } }
    @keyframes sway-near { 0%,100% { transform: rotate(-1.6deg); } 50% { transform: rotate(1.6deg); } }
    @keyframes sway-tall { 0%,100% { transform: rotate(-2.1deg); } 50% { transform: rotate(2.1deg); } }
    .m-far     { transform-origin: 50% 100%; animation: sway-far   9.2s ease-in-out infinite; }
    .m-mid     { transform-origin: 50% 100%; animation: sway-mid   6.7s ease-in-out infinite; }
    .m-near    { transform-origin: 50% 100%; animation: sway-near  4.8s ease-in-out infinite; }
    .m-tall    { transform-origin: 50% 100%; animation: sway-tall  5.6s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .m-far, .m-mid, .m-near, .m-tall { animation: none; }
    }
  </style>
  <defs>
    <linearGradient id="grass-far" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8ea080" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6a8a5f" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="grass-mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a8a5f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3e5a37" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="grass-near" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3e5a37" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#2b3a2a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="seed-plume" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a670" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8a6a3a" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Blade variants (all drawn as if growing upward from origin 0,0) -->
    <!-- straight blade -->
    <path id="blade-s" d="M 0 0 Q -0.8 -70, -0.5 -140 Q 0 -180 0 -200 L 1.5 -200 Q 2 -180 1.5 -140 Q 2 -70 2 0 Z"/>
    <!-- curved left -->
    <path id="blade-l" d="M 0 0 Q -3 -60, -7 -120 Q -11 -170 -14 -200 L -12 -200 Q -9 -170 -5 -120 Q -1 -60 2 0 Z"/>
    <!-- curved right -->
    <path id="blade-r" d="M 0 0 Q 3 -60, 7 -120 Q 11 -170 14 -200 L 12 -200 Q 9 -170 5 -120 Q 1 -60 -2 0 Z"/>
    <!-- chunky blade (wider, for foreground) -->
    <path id="blade-c" d="M 0 0 Q -2 -60, -3 -130 Q -4 -180 -3 -200 L 3 -200 Q 4 -180 3 -130 Q 2 -60 2 0 Z"/>

    <!-- Wheat-style seed head -->
    <g id="seed-wheat">
      <path d="M 0 0 L 0 -46" stroke="#8a6a3a" stroke-width="0.6" fill="none"/>
      <ellipse cx="-2" cy="-6" rx="1.8" ry="4" fill="url(#seed-plume)" transform="rotate(-20 -2 -6)"/>
      <ellipse cx="2" cy="-10" rx="1.8" ry="4" fill="url(#seed-plume)" transform="rotate(20 2 -10)"/>
      <ellipse cx="-2" cy="-16" rx="1.8" ry="4.5" fill="url(#seed-plume)" transform="rotate(-20 -2 -16)"/>
      <ellipse cx="2" cy="-20" rx="1.8" ry="4.5" fill="url(#seed-plume)" transform="rotate(20 2 -20)"/>
      <ellipse cx="-2" cy="-26" rx="1.8" ry="5" fill="url(#seed-plume)" transform="rotate(-20 -2 -26)"/>
      <ellipse cx="2" cy="-30" rx="1.8" ry="5" fill="url(#seed-plume)" transform="rotate(20 2 -30)"/>
      <ellipse cx="0" cy="-40" rx="1.6" ry="4.5" fill="url(#seed-plume)"/>
    </g>

    <!-- Feathery plume (pampas-style) -->
    <g id="seed-plume-fx">
      <path d="M 0 0 L 0 -60" stroke="#8a6a3a" stroke-width="0.7" fill="none"/>
      <path d="M 0 -8 Q -9 -20, -12 -38 Q -10 -42, -2 -28 Q 0 -22, 0 -10 Z" fill="url(#seed-plume)" opacity="0.75"/>
      <path d="M 0 -8 Q 9 -20, 12 -38 Q 10 -42, 2 -28 Q 0 -22, 0 -10 Z" fill="url(#seed-plume)" opacity="0.75"/>
      <path d="M 0 -18 Q -7 -34, -9 -52 Q -7 -58, -1 -42 Q 0 -34, 0 -20 Z" fill="url(#seed-plume)" opacity="0.85"/>
      <path d="M 0 -18 Q 7 -34, 9 -52 Q 7 -58, 1 -42 Q 0 -34, 0 -20 Z" fill="url(#seed-plume)" opacity="0.85"/>
      <ellipse cx="0" cy="-30" rx="2" ry="22" fill="url(#seed-plume)"/>
    </g>

    <!-- Ball seed (Timothy grass) -->
    <g id="seed-ball">
      <path d="M 0 0 L 0 -38" stroke="#8a6a3a" stroke-width="0.6" fill="none"/>
      <ellipse cx="0" cy="-44" rx="3" ry="9" fill="url(#seed-plume)"/>
    </g>
  </defs>

  <!-- FAR layer: short, sparse, low contrast -->
  <g class="m-far" fill="url(#grass-far)">
    <use href="#blade-s" transform="translate(22 320) scale(0.5 0.45)"/>
    <use href="#blade-l" transform="translate(58 320) scale(0.6 0.55)"/>
    <use href="#blade-s" transform="translate(96 320) scale(0.55 0.4)"/>
    <use href="#blade-r" transform="translate(144 320) scale(0.7 0.6)"/>
    <use href="#blade-s" transform="translate(188 320) scale(0.5 0.38)"/>
    <use href="#blade-l" transform="translate(236 320) scale(0.65 0.5)"/>
    <use href="#blade-s" transform="translate(278 320) scale(0.6 0.45)"/>
    <use href="#blade-r" transform="translate(324 320) scale(0.55 0.55)"/>
    <use href="#blade-s" transform="translate(376 320) scale(0.5 0.4)"/>
    <use href="#blade-l" transform="translate(420 320) scale(0.7 0.65)"/>
    <use href="#blade-s" transform="translate(466 320) scale(0.55 0.5)"/>
    <use href="#blade-r" transform="translate(508 320) scale(0.6 0.42)"/>
    <use href="#blade-s" transform="translate(554 320) scale(0.5 0.55)"/>
    <use href="#blade-l" transform="translate(600 320) scale(0.65 0.48)"/>
    <use href="#blade-s" transform="translate(648 320) scale(0.6 0.6)"/>
    <use href="#blade-r" transform="translate(696 320) scale(0.55 0.45)"/>
    <use href="#blade-s" transform="translate(740 320) scale(0.7 0.4)"/>
    <use href="#blade-l" transform="translate(788 320) scale(0.5 0.55)"/>
    <use href="#blade-s" transform="translate(830 320) scale(0.6 0.5)"/>
    <use href="#blade-r" transform="translate(878 320) scale(0.65 0.62)"/>
    <use href="#blade-s" transform="translate(922 320) scale(0.55 0.4)"/>
    <use href="#blade-l" transform="translate(968 320) scale(0.5 0.55)"/>
    <use href="#blade-s" transform="translate(1014 320) scale(0.7 0.5)"/>
    <use href="#blade-r" transform="translate(1058 320) scale(0.6 0.42)"/>
    <use href="#blade-s" transform="translate(1104 320) scale(0.55 0.58)"/>
    <use href="#blade-l" transform="translate(1152 320) scale(0.65 0.45)"/>
    <use href="#blade-s" transform="translate(1196 320) scale(0.5 0.5)"/>
    <use href="#blade-r" transform="translate(1244 320) scale(0.6 0.6)"/>
    <use href="#blade-s" transform="translate(1288 320) scale(0.55 0.4)"/>
    <use href="#blade-l" transform="translate(1336 320) scale(0.7 0.55)"/>
    <use href="#blade-s" transform="translate(1380 320) scale(0.5 0.48)"/>
    <use href="#blade-r" transform="translate(1428 320) scale(0.65 0.42)"/>
    <use href="#blade-s" transform="translate(1472 320) scale(0.55 0.55)"/>
    <use href="#blade-l" transform="translate(1520 320) scale(0.6 0.5)"/>
    <use href="#blade-s" transform="translate(1568 320) scale(0.55 0.45)"/>
  </g>

