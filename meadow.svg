      <use href="#blade-l" transform="translate(782 320) scale(0.9 1.25)"/>
      <use href="#blade-s" transform="translate(828 320) scale(1.2 1)"/>
      <use href="#blade-r" transform="translate(876 320) scale(1 0.85)"/>
      <use href="#blade-s" transform="translate(922 320) scale(0.9 1.3)"/>
      <use href="#blade-l" transform="translate(968 320) scale(1.1 0.8)"/>
      <use href="#blade-s" transform="translate(1014 320) scale(0.85 1.15)"/>
      <use href="#blade-r" transform="translate(1062 320) scale(1 1.4)"/>
      <use href="#blade-s" transform="translate(1106 320) scale(1.1 0.9)"/>
      <use href="#blade-l" transform="translate(1152 320) scale(0.9 1.25)"/>
      <use href="#blade-s" transform="translate(1198 320) scale(1 0.8)"/>
      <use href="#blade-r" transform="translate(1246 320) scale(1.2 1.35)"/>
      <use href="#blade-s" transform="translate(1290 320) scale(0.85 1)"/>
      <use href="#blade-l" transform="translate(1336 320) scale(1 1.2)"/>
      <use href="#blade-s" transform="translate(1382 320) scale(1.1 0.85)"/>
      <use href="#blade-r" transform="translate(1428 320) scale(0.9 1.3)"/>
      <use href="#blade-s" transform="translate(1476 320) scale(1 0.9)"/>
      <use href="#blade-l" transform="translate(1522 320) scale(1.1 1.15)"/>
    </g>
    <!-- Seed heads on mid -->
    <g>
      <use href="#seed-ball"    transform="translate(176 320) scale(1.4)"/>
      <use href="#seed-wheat"   transform="translate(412 320) scale(1.3)"/>
      <use href="#seed-ball"    transform="translate(642 320) scale(1.2)"/>
      <use href="#seed-wheat"   transform="translate(876 320) scale(1.4)"/>
      <use href="#seed-ball"    transform="translate(1106 320) scale(1.3)"/>
      <use href="#seed-wheat"   transform="translate(1336 320) scale(1.25)"/>
    </g>
  </g>

  <!-- TALL layer: feathery plumes standing above the rest -->
  <g class="m-tall">
    <g fill="url(#grass-near)">
      <use href="#blade-s" transform="translate(120 320) scale(1.1 1.8)"/>
      <use href="#blade-l" transform="translate(340 320) scale(1.2 1.9)"/>
      <use href="#blade-r" transform="translate(560 320) scale(1.3 1.75)"/>
      <use href="#blade-s" transform="translate(780 320) scale(1.2 2)"/>
      <use href="#blade-l" transform="translate(1000 320) scale(1.3 1.85)"/>
      <use href="#blade-r" transform="translate(1220 320) scale(1.2 1.95)"/>
      <use href="#blade-s" transform="translate(1440 320) scale(1.3 1.8)"/>
    </g>
    <g>
      <use href="#seed-plume-fx" transform="translate(120 320) scale(1.8)"/>
      <use href="#seed-plume-fx" transform="translate(340 320) scale(1.7)"/>
      <use href="#seed-plume-fx" transform="translate(560 320) scale(1.9)"/>
      <use href="#seed-plume-fx" transform="translate(780 320) scale(1.8)"/>
      <use href="#seed-plume-fx" transform="translate(1000 320) scale(1.7)"/>
      <use href="#seed-plume-fx" transform="translate(1220 320) scale(1.85)"/>
      <use href="#seed-plume-fx" transform="translate(1440 320) scale(1.75)"/>
    </g>
  </g>

  <!-- NEAR layer: chunky foreground blades, varied heights -->
  <g class="m-near" fill="url(#grass-near)">
    <use href="#blade-c" transform="translate(30 320) scale(1.3 1.1)"/>
    <use href="#blade-s" transform="translate(74 320) scale(1.4 0.9)"/>
    <use href="#blade-l" transform="translate(118 320) scale(1.2 1.4)"/>
    <use href="#blade-c" transform="translate(170 320) scale(1.5 1)"/>
    <use href="#blade-r" transform="translate(218 320) scale(1.3 1.2)"/>
    <use href="#blade-s" transform="translate(262 320) scale(1.4 0.85)"/>
    <use href="#blade-c" transform="translate(310 320) scale(1.3 1.3)"/>
    <use href="#blade-l" transform="translate(358 320) scale(1.5 1.1)"/>
