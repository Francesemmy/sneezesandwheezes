      <use href="#blade-s" transform="translate(546 320) scale(0.9 0.85)"/>
      <use href="#blade-l" transform="translate(594 320) scale(1.1 1.2)"/>
      <use href="#blade-s" transform="translate(642 320) scale(1 0.9)"/>
