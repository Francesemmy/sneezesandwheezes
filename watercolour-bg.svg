<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="4" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.18
                             0 0 0 0 0.22
                             0 0 0 0 0.16
                             0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="softEdge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="paperBlotch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="90"/>
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <radialGradient id="spring" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#aec39a" stop-opacity="0.78"/>
      <stop offset="60%" stop-color="#aec39a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#aec39a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="summer" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e0b07a" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#e0b07a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e0b07a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="autumn" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#dfa5a5" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#dfa5a5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#dfa5a5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="winter" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b7c9d4" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#b7c9d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b7c9d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lilac" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c2b1cf" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c2b1cf" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c2b1cf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="olive" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c7c68b" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c7c68b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c7c68b" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="50%" stop-color="#f6efdc"/>
      <stop offset="100%" stop-color="#f0e6cf"/>
    </linearGradient>
  </defs>

  <!-- Paper base -->
  <rect width="1600" height="2400" fill="url(#paper)"/>

  <!-- Watercolour blooms, irregular via displacement -->
  <g filter="url(#paperBlotch)">
    <!-- Top area -->
    <ellipse cx="320" cy="240" rx="420" ry="320" fill="url(#spring)"/>
    <ellipse cx="1280" cy="180" rx="360" ry="300" fill="url(#winter)"/>
    <ellipse cx="820" cy="400" rx="380" ry="300" fill="url(#lilac)"/>

    <!-- Upper mid -->
    <ellipse cx="180" cy="720" rx="340" ry="280" fill="url(#olive)"/>
    <ellipse cx="1120" cy="780" rx="420" ry="300" fill="url(#summer)"/>
    <ellipse cx="620" cy="940" rx="320" ry="240" fill="url(#autumn)"/>

    <!-- Mid -->
    <ellipse cx="1360" cy="1180" rx="360" ry="280" fill="url(#spring)"/>
    <ellipse cx="320" cy="1260" rx="380" ry="300" fill="url(#lilac)"/>
    <ellipse cx="880" cy="1340" rx="340" ry="260" fill="url(#winter)"/>

    <!-- Lower mid -->
    <ellipse cx="180" cy="1680" rx="360" ry="280" fill="url(#summer)"/>
    <ellipse cx="1180" cy="1720" rx="340" ry="280" fill="url(#autumn)"/>
    <ellipse cx="640" cy="1820" rx="380" ry="300" fill="url(#olive)"/>

    <!-- Bottom -->
    <ellipse cx="1340" cy="2180" rx="400" ry="300" fill="url(#spring)"/>
    <ellipse cx="380" cy="2240" rx="360" ry="280" fill="url(#lilac)"/>
    <ellipse cx="880" cy="2320" rx="340" ry="260" fill="url(#summer)"/>
  </g>

  <!-- Subtle paper grain -->
  <rect width="1600" height="2400" filter="url(#grain)" opacity="0.5"/>
</svg>
