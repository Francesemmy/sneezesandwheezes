      <stop offset="70%" stop-color="#d89a4f"/>
      <stop offset="100%" stop-color="#a36d2d"/>
    </radialGradient>
  </defs>
  <g transform="translate(20 20)" stroke="#6a8a5f" stroke-width="0.5" stroke-opacity="0.55">
    <g fill="url(#petal)">
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(30)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(60)"/>
