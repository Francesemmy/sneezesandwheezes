      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(150)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(180)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(210)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(240)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(270)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(300)"/>
      <ellipse cx="0" cy="-10.5" rx="2.6" ry="6.2" transform="rotate(330)"/>
