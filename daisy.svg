<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Daisy logomark">
  <defs>
    <radialGradient id="petal" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="85%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#ead8e6"/>
    </radialGradient>
    <radialGradient id="heart" cx="35%" cy="35%" r="70%">
